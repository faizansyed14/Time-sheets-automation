# Alembic configuration for the Timesheet Intelligence Portal.
#
# The database URL is NOT hard-coded here. env.py reads it (in priority order):
#   1. `-x dburl=...`            (one-off override on the command line)
#   2. $ALEMBIC_DATABASE_URL     (env var)
#   3. settings.database_url     (the app's DATABASE_URL from .env)
# so migrations always target the same database the app uses (local, Docker, or
# AWS RDS) with no extra configuration.

[alembic]
# Path to migration scripts (relative to this file / the backend/ dir).
script_location = alembic

# Make the `app` package importable when alembic runs from backend/.
prepend_sys_path = .

# Timestamped, slug-friendly revision filenames: 0001_xxxx is kept readable.
# (We set explicit down_revisions, so ordering is by the revision chain.)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use OS-native path separators.
path_separator = os

# sqlalchemy.url is intentionally blank — env.py supplies it from settings.
sqlalchemy.url =


[post_write_hooks]
# (Optional) auto-format generated migrations. Disabled by default.


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
