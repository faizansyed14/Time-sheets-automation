# Optional: run your production-style Postgres locally.
#   docker compose -f docker-compose.postgres.yml up -d
# then in backend/.env:
#   DATABASE_URL=postgresql+asyncpg://timesheet:timesheet@localhost:5432/timesheet_db
# and uncomment asyncpg in backend/requirements.txt.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: timesheet_db
      POSTGRES_USER: timesheet
      POSTGRES_PASSWORD: timesheet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
