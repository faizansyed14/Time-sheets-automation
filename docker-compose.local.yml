# LOCAL stack — uses Docker volumes for Postgres + file storage.
# No AWS RDS required. No S3 required.
#
# Usage:
#   cp .env.local .env
#   docker compose -f docker-compose.local.yml --env-file .env up -d --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-timesheet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-timesheet}
      POSTGRES_DB: ${POSTGRES_DB:-timesheet}
    volumes: [pg_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timesheet}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build: { context: ./backend }
    command: sh -c "python bootstrap_migrations.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}"
    env_file: [.env]
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
      AUTO_CREATE_TABLES: "false"
    volumes:
      - backend_storage:/app/storage
    expose: ["8000"]
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build: { context: ./backend }
    command: celery -A app.core.celery_app.celery_app worker -B --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2}
    env_file: [.env]
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
      AUTO_CREATE_TABLES: "false"
      DB_NULLPOOL: "true"
    volumes:
      - backend_storage:/app/storage
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
      db: { condition: service_healthy }
      backend: { condition: service_healthy }

  nginx:
    build: { context: ./frontend, target: prod }
    ports: ["127.0.0.1:8080:80"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on: [backend]

volumes:
  pg_data:
  redis_data:
  backend_storage:
