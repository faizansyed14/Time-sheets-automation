# Production SPA serving + API reverse proxy to the backend service.
# Security headers, gzip, large-upload support, and streaming-friendly proxy
# settings (so multi-GB ZIP downloads pass straight through without buffering).

# Cap request bodies globally; uploads (timesheets / vault files) need headroom.
client_max_body_size 100m;

# gzip for text assets (JS/CSS/JSON). Binary files (PDF/zip/images) are skipped.
gzip on;
gzip_vary on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_proxied any;
gzip_types
    text/plain text/css application/javascript application/json
    application/xml image/svg+xml font/woff2;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---- security headers (defence-in-depth for the SPA + API) ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Tighten/loosen the CSP to match any third-party origins you add.
    add_header Content-Security-Policy
        "default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self'; frame-src 'self' blob:; object-src 'self' blob:; base-uri 'self'; form-action 'self'" always;

    # Don't leak the nginx version.
    server_tokens off;

    # API + auth + health -> backend container (compose service name "backend")
    location ~ ^/(api|auth|health) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;

        # Stream large responses (ZIP exports) straight to the client instead of
        # buffering them to disk/RAM first — essential for multi-GB vaults.
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;

        # Long-running exports / extraction calls.
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Cache fingerprinted static assets aggressively; never cache index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
