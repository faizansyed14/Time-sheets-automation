# DEV reverse proxy — single entry point in front of the Vite dev server and the
# backend, mirroring the prod topology while KEEPING hot-module-reload.
#
#   /api, /auth, /health  -> backend:8000
#   everything else        -> frontend (Vite) :5173, including the HMR websocket
#
# Vite is told to point its HMR socket at this proxy's port via
# VITE_HMR_CLIENT_PORT (see docker-compose.dev.yml), so live reload works through
# nginx. The container still exposes 5173/8000 directly for debugging.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    # Backend API / auth / health.
    location ~ ^/(api|auth|health) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        # Stream large ZIP exports straight through (no buffering).
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Vite dev server (app + HMR websocket).
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        # WebSocket upgrade so Vite hot-module-reload keeps working behind nginx.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;   # keep the long-lived HMR socket open
    }
}
