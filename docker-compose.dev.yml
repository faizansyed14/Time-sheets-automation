# DEV/STAGING stack — production-style build (built SPA served by nginx,
# multi-worker uvicorn) that talks to EXTERNAL AWS RDS (Postgres) and S3 (files).
# No local Postgres and no local file-storage volume: RDS holds all data, S3
# holds all files, so those Docker volumes are intentionally absent.
#
# The ONLY local stateful piece is Redis (Celery broker + cache + rate-limit
# windows). It keeps a small appendonly volume so queued background jobs survive
# a restart — that is a broker concern, not application data.
#
# Same file runs on your laptop and on the shared dev/staging EC2. On EC2 a
# host-level nginx + certbot terminates HTTPS and proxies to 127.0.0.1:8080
# (see docs/DEPLOYMENT.md). Locally just open http://localhost:8080.
#
#   docker compose -f docker-compose.dev.yml --env-file .env up -d --build
# or: bash scripts/dev/start.sh
#
# Required in .env:
#   DATABASE_URL      postgresql+asyncpg://USER:PASS@<rds-endpoint>:5432/timesheet
#   STORAGE_PROVIDER  s3
#   S3_BUCKET/S3_REGION   your bucket
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY   BLANK on EC2 (instance IAM role);
#     set them only when running outside AWS (e.g. laptop) without a role.
# Optional tuning (defaults shown):
#   UVICORN_WORKERS=4       CELERY_CONCURRENCY=3

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.50", memory: 256M }

  backend:
    build: { context: ./backend }
    # Apply Alembic migrations against the RDS in DATABASE_URL, THEN serve.
    # Workers are tunable from .env (UVICORN_WORKERS) without editing this file.
    command: sh -c "python bootstrap_migrations.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-4}"
    env_file: [.env]
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
      AUTO_CREATE_TABLES: "false"        # Alembic (against RDS) owns the schema
      # DATABASE_URL / STORAGE_PROVIDER / S3_* come from .env only
    expose: ["8000"]
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits: { cpus: "2.00", memory: 2048M }

  worker:
    build: { context: ./backend }
    # -B = embedded beat scheduler (pipeline-raw purge on
    # PIPELINE_RAW_PURGE_INTERVAL_HOURS from .env). Keep this a SINGLE replica
    # — beat must not run twice.
    command: celery -A app.core.celery_app.celery_app worker -B --loglevel=info --concurrency=${CELERY_CONCURRENCY:-3}
    env_file: [.env]
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
      AUTO_CREATE_TABLES: "false"
      DB_NULLPOOL: "true"
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
      backend: { condition: service_healthy }   # wait for migrations to finish
    deploy:
      resources:
        limits: { cpus: "1.00", memory: 1024M }

  frontend:
    build: { context: ./frontend, target: prod }
    volumes:
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    expose: ["80"]
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.50", memory: 256M }

  # Public gateway: SPA → frontend, API → backend.
  nginx:
    image: nginx:1.27-alpine
    ports: ["127.0.0.1:8080:80"]
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on: [frontend, backend]
    deploy:
      resources:
        limits: { cpus: "0.50", memory: 256M }

volumes:
  redis_data:
